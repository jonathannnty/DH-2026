<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("pf-theme");
          const prefersLight = window.matchMedia(
            "(prefers-color-scheme: light)",
          ).matches;
          const theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : prefersLight
                ? "light"
                : "dark";

          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>DH-2026 Career Advisor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
